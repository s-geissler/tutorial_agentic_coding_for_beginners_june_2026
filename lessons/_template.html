<!doctype html>
<!--
  _template.html
  ------------------------------------------------------------
  Source for the bundled deck. NEVER edit
  0001-agentic-coding-fundamentals.html directly — it's
  generated by build.js. Edit this file or the slide files
  in slides/0001/, then run:

      node build.js

  To add a new slide:
    1. Create slides/0001/NN-some-name.html (copy an existing
       slide as a template; it just needs a single
       <section class="slide" data-section="N"
                data-section-label="Foo"
                data-title="..." data-toc="...">...</section>).
    2. Run `node build.js`.

  That's it. The central design (nav UI, theme, TOC, slide
  styles) lives in this file and the shared/ directory, and
  does not need to change when you add a slide.
-->
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agentic Coding for Beginners</title>
  <meta name="description" content="A 90-minute teaching unit on agentic coding tools for CS PhD students.">
  <style>
    /* ============================================================
       Shared slide styles (design tokens, slide layout, widgets)
       Inlined from shared/slide.css at build time.
       ============================================================ */
    /* ===SHARED_CSS=== */
  </style>
  <style>
    /* ============================================================
       Central deck styles (nav UI, TOC)
       Lives only in the central file.
       ============================================================ */
    .nav-progress {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--border);
      z-index: 100;
    }
    .nav-progress-bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width var(--transition);
    }

    .nav-counter {
      position: fixed;
      top: 1rem; right: 1.5rem;
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      color: var(--fg-muted);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      padding: 0.35rem 0.75rem;
      border-radius: var(--radius-sm);
      z-index: 100;
      font-variant-numeric: tabular-nums;
    }
    .nav-counter kbd {
      font-family: var(--font-mono);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 0 0.3em;
      border-radius: 3px;
      font-size: 0.7rem;
    }

    .nav-section {
      position: fixed;
      top: 1rem; left: 1.5rem;
      font-size: 0.8rem;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      z-index: 100;
    }
    .nav-section .accent { color: var(--accent); }

    .nav-arrows {
      position: fixed;
      bottom: 1.5rem; right: 1.5rem;
      display: flex;
      gap: 0.5rem;
      z-index: 100;
    }
    .nav-arrows button {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--fg);
      width: 2.5rem;
      height: 2.5rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      font-family: var(--font-sans);
    }
    .nav-arrows button:hover:not(:disabled) {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    .nav-arrows button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .nav-button {
      position: fixed;
      bottom: 1.5rem; left: 5.5rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 0 0.75rem;
      height: 2.5rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.85rem;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: all var(--transition);
      font-family: var(--font-sans);
    }
    .nav-button:hover {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: var(--accent);
    }
    .nav-button kbd {
      font-family: var(--font-mono);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 0 0.3em;
      border-radius: 3px;
      font-size: 0.7rem;
    }
    .nav-button:hover kbd { background: rgba(255,255,255,0.2); border-color: transparent; color: var(--accent-fg); }

    .theme-toggle {
      position: fixed;
      bottom: 1.5rem; left: 1.5rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--fg);
      width: 2.5rem;
      height: 2.5rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 1.1rem;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }
    .theme-toggle:hover {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: var(--accent);
    }

    .toc {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 10, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 2rem;
      backdrop-filter: blur(4px);
    }
    .toc.open { display: flex; }
    .toc-content {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      max-width: 56rem;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }
    .toc h3 { margin: 0 0 1.5rem; }
    .toc ol { list-style: none; padding: 0; margin: 0; columns: 2; column-gap: 2rem; }
    .toc li { margin-bottom: 0.4rem; break-inside: avoid; }
    .toc a {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.4rem 0.6rem;
      border-radius: var(--radius-sm);
      color: var(--fg);
      text-decoration: none;
      font-size: 0.875rem;
      border: 0;
      transition: background var(--transition);
    }
    .toc a:hover { background: var(--accent); color: var(--accent-fg); }
    .toc a .num { font-family: var(--font-mono); font-size: 0.75rem; color: var(--fg-subtle); min-width: 2rem; }
    .toc a:hover .num { color: var(--accent-fg); }
    .toc .hint { color: var(--fg-muted); font-size: 0.8rem; margin-top: 1.25rem; text-align: center; }

    @media (max-width: 700px) {
      .nav-section { display: none; }
    }

    @media print {
      .nav-progress, .nav-counter, .nav-section,
      .nav-arrows, .nav-button, .theme-toggle, .toc { display: none; }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       Navigation UI (sticky, non-slide)
       ============================================================ -->
  <div class="nav-progress"><div class="nav-progress-bar" id="progress"></div></div>
  <div class="nav-section" id="nav-section"><span class="accent">&#167; 1 &#183; Welcome</span></div>
  <div class="nav-counter" id="nav-counter">1 / 26 &#183; <kbd>?</kbd> for TOC</div>
  <button class="theme-toggle" id="theme-toggle" title="Toggle theme">&#9728;</button>
  <button class="nav-button" id="toc-button" title="Open table of contents (Esc)"><kbd>Esc</kbd> Overview</button>
  <div class="nav-arrows">
    <button id="prev" title="Previous slide (&#8592;)">&#8592;</button>
    <button id="next" title="Next slide (&#8594;)">&#8594;</button>
  </div>

  <!-- TOC overlay -->
  <div class="toc" id="toc">
    <div class="toc-content">
      <h3>Table of contents</h3>
      <ol id="toc-list"></ol>
      <p class="hint">Click anywhere outside this panel, or press <span class="kbd">Esc</span> to close.</p>
    </div>
  </div>


  <!-- ============================================================
       SLIDES
       Inlined from slides/0001/*.html at build time.
       ============================================================ -->
  <!-- ===SLIDES=== -->


  <!-- ============================================================
       Scripts
       ============================================================ -->
  <script>
    /* ===WIDGETS_JS=== */
  </script>
  <script>
    'use strict';

    /* ======================================================
       Slide navigation
       ====================================================== */
    const slides = Array.from(document.querySelectorAll('.slide'));
    const total = slides.length;
    const counter = document.getElementById('nav-counter');
    const section = document.getElementById('nav-section');
    const progress = document.getElementById('progress');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const toc = document.getElementById('toc');
    const tocList = document.getElementById('toc-list');
    let current = 0;

    function pad(n) { return String(n).padStart(2, '0'); }

    // Derive the visible section label from the slide's data attrs.
    function sectionLabelFor(slide) {
      const num = slide.dataset.section || '';
      const label = slide.dataset.sectionLabel || '';
      return num ? `\u00a7 ${num} \u00b7 ${label}` : label;
    }

    function go(i) {
      if (i < 0 || i >= total) return;
      slides[current].classList.remove('active');
      current = i;
      slides[current].classList.add('active');
      counter.innerHTML = `${current + 1} / ${total} \u00b7 <kbd>?</kbd> for TOC`;
      section.innerHTML = `<span class="accent">${sectionLabelFor(slides[current])}</span>`;
      progress.style.width = `${((current + 1) / total) * 100}%`;
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === total - 1;
      try { history.replaceState(null, '', '#' + (current + 1)); } catch (e) { /* ignore */ }
    }

    function next() { go(Math.min(current + 1, total - 1)); }
    function prev() { go(Math.max(current - 1, 0)); }

    prevBtn.addEventListener('click', prev);
    nextBtn.addEventListener('click', next);

    document.addEventListener('keydown', (e) => {
      const tag = (e.target.tagName || '').toLowerCase();
      if (tag === 'input' || tag === 'textarea') return;
      if (toc.classList.contains('open')) {
        if (e.key === 'Escape') { e.preventDefault(); closeToc(); }
        return;
      }
      switch (e.key) {
        case 'ArrowRight':
        case 'PageDown':
        case ' ':
          e.preventDefault(); next(); break;
        case 'ArrowLeft':
        case 'PageUp':
          e.preventDefault(); prev(); break;
        case 'Home':
          e.preventDefault(); go(0); break;
        case 'End':
          e.preventDefault(); go(total - 1); break;
        case 'Escape':
        case '?':
          e.preventDefault(); openToc(); break;
        case 't':
        case 'T':
          e.preventDefault(); toggleTheme(); break;
      }
    });

    // Click left/right thirds to advance/retreat. Widgets stop
    // propagation by virtue of being clickable elements, so the
    // closest(...) check skips them.
    slides.forEach((s) => {
      s.addEventListener('click', (e) => {
        const interactive = e.target.closest('button, a, input, pre, .tokenizer, .context-window, .skill-card, .ralph-loop, .toc');
        if (interactive) return;
        const x = e.clientX;
        if (x < window.innerWidth / 3) prev();
        else next();
      });
    });

    /* ======================================================
       Table of contents
       ====================================================== */
    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function buildToc() {
      const html = slides.map((s, i) => {
        const num = pad(i + 1);
        const title = s.dataset.toc || s.dataset.title || `Slide ${num}`;
        return `<li><a href="#${i + 1}" data-idx="${i}"><span class="num">${num}</span><span>${escapeHtml(title)}</span></a></li>`;
      }).join('');
      tocList.innerHTML = html;
      tocList.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', (e) => {
          e.preventDefault();
          go(parseInt(a.dataset.idx, 10));
          closeToc();
        });
      });
    }
    function openToc() { toc.classList.add('open'); }
    function closeToc() { toc.classList.remove('open'); }
    toc.addEventListener('click', (e) => { if (e.target === toc) closeToc(); });
    document.getElementById('toc-button').addEventListener('click', openToc);

    /* ======================================================
       Theme toggle
       ====================================================== */
    const themeBtn = document.getElementById('theme-toggle');
    function setTheme(t) {
      document.documentElement.dataset.theme = t;
      themeBtn.textContent = t === 'dark' ? '\u263e' : '\u2600';
      try { localStorage.setItem('theme', t); } catch (e) {}
    }
    function toggleTheme() {
      setTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
    }
    themeBtn.addEventListener('click', toggleTheme);
    // Restore
    try {
      const saved = localStorage.getItem('theme');
      if (saved) setTheme(saved);
      else if (window.matchMedia('(prefers-color-scheme: dark)').matches) setTheme('dark');
    } catch (e) {}

    /* ======================================================
       Boot
       ====================================================== */
    // Fill in each slide's section label and number from its
    // data attributes. (The slide files leave these empty so
    // the values can be derived centrally.)
    slides.forEach((s, i) => {
      const headerSection = s.querySelector('.slide-header .section');
      if (headerSection) {
        headerSection.textContent = sectionLabelFor(s);
      }
      const headerNumber = s.querySelector('.slide-header .number');
      if (headerNumber) {
        headerNumber.textContent = `${pad(i + 1)} / ${pad(total)}`;
      }
    });

    buildToc();
    // Initial slide from URL hash if present
    const m = (location.hash || '').match(/^#(\d+)$/);
    if (m) {
      const i = parseInt(m[1], 10) - 1;
      if (i >= 0 && i < total) current = i;
    }
    slides.forEach((s, i) => { if (i !== current) s.classList.remove('active'); });
    slides[current].classList.add('active');
    // Render initial state
    (function init() {
      section.innerHTML = `<span class="accent">${sectionLabelFor(slides[current])}</span>`;
      counter.innerHTML = `${current + 1} / ${total} \u00b7 <kbd>?</kbd> for TOC`;
      progress.style.width = `${((current + 1) / total) * 100}%`;
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === total - 1;
      try { history.replaceState(null, '', '#' + (current + 1)); } catch (e) { /* ignore */ }
    })();
  </script>
</body>
</html>
