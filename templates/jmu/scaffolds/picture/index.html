<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Picture slide</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="slide" data-section="1" data-section-label=""
           data-title="Picture slide" data-toc="Picture slide">
    <div class="slide-header">
      <span class="section"></span>
      <span class="number"></span>
    </div>
    <div class="slide-body">
      <h2>Caption for the picture</h2>
      <p class="lead">A short framing sentence (optional).</p>
      <p>Drop a picture file into <code>assets/</code> and reference it
      below. The build will rewrite the path so the bundled deck can find
      it.</p>
      <img class="hero" src="assets/hero.png" alt="Describe what's in the image" data-lightbox>
      <p class="muted small">Caption goes here. Click the image to zoom.</p>
    </div>
  </section>
  <script src="script.js"></script>
</body>
</html>
