<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Section heading</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="slide" data-section="2" data-section-label="Section"
           data-title="Section name" data-toc="Section 2 &mdash; Section name">
    <div class="slide-header">
      <span class="section"></span>
      <span class="number"></span>
    </div>
    <div class="slide-body center">
      <p class="muted small" style="margin: 0 0 1.5rem; letter-spacing: 0.08em; text-transform: uppercase;">Part 2</p>
      <h1 style="font-size: clamp(4rem, 8vw, 7rem); margin: 0 0 1rem;">Section name</h1>
      <p class="lead" style="max-width: 50rem; margin: 0 auto;">A short framing sentence for the section.</p>
    </div>
  </section>
  <script src="script.js"></script>
</body>
</html>
