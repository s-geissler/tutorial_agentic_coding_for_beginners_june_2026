<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Slide</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="slide" data-section="1" data-section-label=""
           data-title="Slide title" data-toc="Slide title">
    <div class="slide-header">
      <span class="section"></span>
      <span class="number"></span>
    </div>
    <div class="slide-body">
      <h2>Slide title</h2>
      <p class="lead">A one-sentence summary of the slide's point.</p>
      <p>Body content goes here. Use this scaffold for any plain content slide
      that doesn't fit one of the other archetypes (cover, section heading,
      picture-focused). Edit the title, lead, and body to match the slide's
      actual content.</p>
    </div>
  </section>
  <script src="script.js"></script>
</body>
</html>
