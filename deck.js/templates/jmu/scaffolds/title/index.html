<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Title slide</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="slide" data-section="1" data-section-label=""
           data-title="Title slide" data-toc="Title slide">
    <div class="slide-header">
      <span class="section"></span>
      <span class="number"></span>
    </div>
    <div class="slide-body">
      <h1>Talk title</h1>
      <p class="lead">A one-sentence tagline or subtitle for the talk.</p>
      <p class="muted small">Author name &middot; Affiliation &middot; Date</p>
    </div>
  </section>
  <script src="script.js"></script>
</body>
</html>
